apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rio-adapter-secrets
  namespace: rio-adapter-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: rio-adapter-secrets
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "{{ .database_url }}"
        REDIS_URL: "{{ .redis_url }}"
        NATS_URL: "{{ .nats_url }}"
        LOG_LEVEL: "{{ .log_level }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: dev/rio-adapter
        property: database_url
    - secretKey: redis_url
      remoteRef:
        key: dev/rio-adapter
        property: redis_url
    - secretKey: nats_url
      remoteRef:
        key: dev/rio-adapter
        property: nats_url
    - secretKey: log_level
      remoteRef:
        key: dev/rio-adapter
        property: log_level
