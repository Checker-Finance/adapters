apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: xfx-adapter-secrets
  namespace: xfx-adapter-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: xfx-adapter-secrets
    creationPolicy: Owner
    template:
      data:
        DATABASE_URL: "{{ .DATABASE_URL }}"
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: uat/security-master
        property: DATABASE_URL
