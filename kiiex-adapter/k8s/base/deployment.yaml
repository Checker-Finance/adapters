apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiiex-adapter
  namespace: kiiex-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kiiex-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kiiex-adapter
    spec:
      serviceAccountName: kiiex-adapter
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kiiex-adapter
      containers:
        - name: kiiex-adapter
          image: kiiex-adapter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: kiiex-adapter-config
            - secretRef:
                name: kiiex-adapter-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: Always
