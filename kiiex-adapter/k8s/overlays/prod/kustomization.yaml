apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kiiex-adapter

resources:
  - ../../base
  - secretstore.yaml
  - externalsecret.yaml

images:
  - name: kiiex-adapter
    newName: 730335471935.dkr.ecr.us-east-2.amazonaws.com/kiiex-adapter
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: kiiex-adapter
  - target:
      kind: ConfigMap
      name: kiiex-adapter-config
    patch: |-
      - op: replace
        path: /data/ENV
        value: prod
      - op: replace
        path: /data/LOG_LEVEL
        value: info
