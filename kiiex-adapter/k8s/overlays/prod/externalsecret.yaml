apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kiiex-adapter-secrets
  namespace: kiiex-adapter
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: kiiex-adapter-secrets
    creationPolicy: Owner
    template:
      data:
        NATS_URL: "{{ .nats_url }}"
        LOG_LEVEL: "{{ .log_level }}"
  data:
    - secretKey: nats_url
      remoteRef:
        key: prod/kiiex-adapter
        property: nats_url
    - secretKey: log_level
      remoteRef:
        key: prod/kiiex-adapter
        property: log_level
